services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file:
      - ${BINANCE_ENV_FILE:-/root/.config/trading-bot/binance_testnet.env}
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://trading:trading@timescaledb:5432/trading
      EXECUTION_MODE: testnet
      MARKET_DATA_MODE: prod_public
    command: ["trading-bot", "smoke"]
    profiles:
      - app

volumes:
  tsdata:
