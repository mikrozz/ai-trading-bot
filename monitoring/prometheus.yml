global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: trading-bot
    static_configs:
      - targets:
          - host.docker.internal:9108
          - host.docker.internal:9109
        labels:
          service: trading-bot

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
