exchange: binance_spot
execution_mode: testnet  # testnet | paper | live
market_data_mode: prod_public  # prod_public | testnet

symbols:
  - BTCUSDT
  - ETHUSDT

intervals:
  - 1m
  - 5m
  - 15m

fees:
  maker: 0.001
  taker: 0.001

slippage:
  liquid: 0.0005
  illiquid: 0.002

risk:
  daily_drawdown_limit: 0.05
  weekly_drawdown_limit: 0.10
  max_position_fraction: 0.10
  max_open_positions: 5
  stop_loss: 0.02
  listing_ban_minutes: 5

paper:
  prob_threshold: 0.60
  min_hold_bars: 6      # 5m × 6 = 30m минимум в позиции
  cooldown_bars: 3      # пауза после закрытия перед новым входом
  position_fraction: 0.10

live_testnet:
  position_fraction: 0.05   # жёсткий cap 5% (код не принимает выше)
  prob_threshold: 0.60
  min_hold_bars: 6
  cooldown_bars: 3
  max_orders_per_hour: 20

ingest:
  depth_levels: 20
  redis_stream_maxlen: 100000

logging:
  level: INFO
  json: true
