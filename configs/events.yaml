# Macro / high-impact event calendar (all times UTC ISO-8601).
#
# How to add an event:
#   1. Append under `events:` with `name` + `at` (UTC, Z or +00:00).
#   2. Keep times in UTC even if the release is quoted in US/Eastern.
#   3. Blackout window comes from configs/default.yaml → events.minutes_before/after.
#
# Example:
#   - name: FOMC
#     at: "2026-09-17T18:00:00Z"
#
# If this file is missing or `events:` is empty, blackout is a no-op.

events:
  # Placeholders — replace/extend with real scheduled times before live use.
  - name: FOMC
    at: "2026-07-30T18:00:00Z"
  - name: US_CPI
    at: "2026-08-12T12:30:00Z"
  - name: NFP
    at: "2026-08-07T12:30:00Z"
